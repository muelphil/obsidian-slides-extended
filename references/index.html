<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Helmholtz AI – Demo Presentation</title>

    <!-- Reveal.js (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css"/>

    <!-- Helmholtz AI template (load AFTER reveal.css so overrides take effect) -->
    <link rel="stylesheet" href="helmholtz-template/css/helmholtz-ai.css"/>

    <!-- Reveal.js highlight plugin for code blocks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/monokai.css"/>
    <style type="text/css">@page {
        size: 1600px 1000px;
        margin: 0px;
    }</style>
    <style>
        /*
         * Force the browser chrome to match the slide background so there
         * is no visible gap around the slides.
         */
        body {
            background: #1a1a2e;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="reveal">
    <div class="slides">

        <!--
          All slides are defined in slides.md.
          The plugin's preprocessMarkdown() converts YAML front matter blocks into
          .slide: data-... attributes before Reveal.js parses the markdown.
          Slides are separated by a blank line + "---" + blank line.
          Speaker notes follow "Note:" lines.
        -->
        <section
                data-markdown
                data-separator="\n\n---\n\n"
                data-separator-notes="^Note:">
            <textarea id="slides-content" data-template></textarea>
        </section>

    </div><!-- /.slides -->
</div><!-- /.reveal -->


<!-- Reveal.js core + plugins (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/math/math.js"></script>

<!-- Helmholtz AI template plugin -->
<script src="helmholtz-template/js/helmholtz-ai-plugin.js"></script>

<script>

    const metadata = {
        author: 'John Doe',
        institution: 'Helmholtz Center ABC',
        shortTitle: 'Short Title',
        date: 'YYYY-MM-DD',

    };

    fetch('slides.md')
        .then(r => r.text())
        .then(markdown => {
            document.getElementById('slides-content').textContent =
                HelmholtzAIPlugin.preprocessMarkdown(markdown, metadata);

            Reveal.initialize({
                width: 1600, height: 1000,   // ← change only this line for a different aspect ratio
                margin: 0,
                minScale: 0.1,
                maxScale: 3.0,

                center: false,

                hash: true,
                controls: true,
                progress: false,        // no progress bar (cleaner look)
                slideNumber: false,     // page numbers handled by the plugin
                showNotes: false,

                transition: 'none',   // instant slide transitions (PowerPoint style)
                transitionSpeed: 'fast',
                pdfPageHeightOffset: 0,
                pdfSeparateFragments: false,



                metadata,

                plugins: [
                    RevealMarkdown,       // MUST be first: parses markdown before other plugins run
                    HelmholtzAIPlugin,    // YAML preprocessed before init(); injects header/footer
                    RevealHighlight,
                    RevealNotes,
                    RevealMath.MathJax3,
                ],
            });
        });
</script>

</body>
</html>
